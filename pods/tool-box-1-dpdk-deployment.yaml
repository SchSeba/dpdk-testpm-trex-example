---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: toolbox-1
  namespace: seba
  labels:
    app: dpdk-1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dpdk-1
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: '[
          {
           "name": "dpdk-network-1",
           "namespace": "seba"
          }
        ]'
      labels:
        app: dpdk-1
    spec:
      containers:
        - command:
            - /bin/bash
            - -c
            - sleep INF
          image: quay.io/schseba/toolbox:latest
          imagePullPolicy: Always
          name: dpdk
          securityContext:
            #        privileged: true
            runAsUser: 0 #for root container
      terminationGracePeriodSeconds: 2
