---
apiVersion: v1
kind: Pod
metadata:
  annotations:
    k8s.v1.cni.cncf.io/networks: '[
      {
       "name": "ib-network-2",
       "namespace": "seba"
      }
    ]'
  labels:
    app: infiniband-server
  name: infiniband-server
  namespace: seba
spec:
  containers:
    - command:
        - /bin/bash
        - -c
        - |
          dnf install -y perftest infiniband-diags rdma-core libibverbs-utils
          sleep INF
      image: quay.io/cloud-bulldozer/k8s-netperf:latest
      imagePullPolicy: Always
      name: netperf
      resources:
        limits:
          cpu: "2"
          memory: 1Gi
          openshift.io/ib_nic_2: "1"  # Request IB VF from ib_nic_2 resource pool
        requests:
          cpu: "2"
          memory: 1Gi
          openshift.io/ib_nic_2: "1"
      securityContext:
        capabilities:
          add:
            - IPC_LOCK
            - NET_RAW
            - NET_ADMIN
  terminationGracePeriodSeconds: 2
